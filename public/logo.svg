<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>

  <!-- Chart/Graph bars -->
  <g fill="#ef4444" opacity="0.3">
    <rect x="50" y="120" width="20" height="40" rx="4"/>
    <rect x="80" y="100" width="20" height="60" rx="4"/>
    <rect x="110" y="80" width="20" height="80" rx="4"/>
  </g>

  <!-- Trending arrow line -->
  <polyline
    points="50,140 80,110 110,85 140,55"
    stroke="#ef4444"
    stroke-width="8"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow head -->
  <path
    d="M 140 55 L 155 50 L 150 65"
    fill="#ef4444"
    stroke="#ef4444"
    stroke-width="2"
    stroke-linejoin="round"
  />
</svg>